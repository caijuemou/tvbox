[custom]
; ==================== 策略组设置 ====================
; 格式：策略组名=类型, 匹配关键字1, 匹配关键字2...

; 1. 🤖 AI 策略组：建议用 select 手动选择，防止频繁跳 IP 被封号
proxy_group=🤖 AI服务=select, AI, ⚠️ 只有满足关键字的节点会被抓到这里

; 2. 🎬 流媒体策略组：可以用 url-test 自动选最快的
proxy_group=🎬 国外流媒体=url-test, 流媒体, url=http://cp.cloudflare.com/generate_204, interval=300, tolerance=50

; 3. 💻 GitHub与日常国外代理：把所有可用节点都塞进去，自动测速
proxy_group=💻 开发与日常代理=url-test, .*, url=http://cp.cloudflare.com/generate_204, interval=300, tolerance=50

; 4. 🧭 漏网之鱼/默认兜底组
proxy_group=⚓ 漏网之鱼=select, 💻 开发与日常代理, DIRECT

; ==================== 分流规则集设置 ====================
; 使用标准的 Geosite/GeoIP 规则，由远端 subconverter 自动下载集成

; 1. 拦截广告（可选，建议加上）
rule_provider=reject,type:http,behavior:domain,url:https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt,path:./ruleset/reject.yaml,interval:86400

; 2. 国际 AI 域名规则
rule_provider=openai,type:http,behavior:domain,url:https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/openai.txt,path:./ruleset/openai.yaml,interval:86400

; 3. 流媒体域名规则（整合常见国外流媒体）
rule_provider=netflix,type:http,behavior:domain,url:https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/netflix.txt,path:./ruleset/netflix.yaml,interval:86400
rule_provider=youtube,type:http,behavior:domain,url:https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/youtube.txt,path:./ruleset/youtube.yaml,interval:86400

; 4. GitHub 域名规则
rule_provider=github,type:http,behavior:domain,url:https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/github.txt,path:./ruleset/github.yaml,interval:86400

; 5. 国内直连白名单
rule_provider=cn_domain,type:http,behavior:domain,url:https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cn.txt,path:./ruleset/cn_domain.yaml,interval:86400

; ==================== 规则匹配顺序 ====================
[rules]
; 广告拦截
- RULE-SET,reject,REJECT
; AI 走 AI 组
- RULE-SET,openai,🤖 AI服务
; 流媒体走流媒体组
- RULE-SET,netflix,🎬 国外流媒体
- RULE-SET,youtube,🎬 国外流媒体
; GitHub 走开发代理组
- RULE-SET,github,💻 开发与日常代理
; 国内域名直连
- RULE-SET,cn_domain,DIRECT
; 国内局域网、中国 IP 直连
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
; 最后的兜底：没命中的国外网站走漏网之鱼
- MATCH,⚓ 漏网之鱼

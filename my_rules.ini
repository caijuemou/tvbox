[custom]

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

; ==================== 规则集定义 ====================
ruleset=🚀 国外流量,https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Custom_Proxy.list
ruleset=👨‍💻 GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
ruleset=🧚 AI,https://raw.githubusercontent.com/cutethotw/ClashRule/refs/heads/main/Rule/Claude.list
ruleset=🧚 AI,clash-classic:https://raw.githubusercontent.com/cutethotw/ClashRule/refs/heads/main/Rule/AI.yaml
ruleset=🎯 国内流量,https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Custom_Direct.list
ruleset=🎯 国内流量,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
ruleset=🛑 广告拦截,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ZhihuAds/ZhihuAds.yaml
ruleset=📹 YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
ruleset=🎥 Netflix,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
ruleset=🐹 DisneyPlus,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.yaml
ruleset=📺 巴哈姆特,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Bahamut/Bahamut.yaml
ruleset=🌍 国外媒体,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia_Classical.yaml
ruleset=🌏 国内媒体,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMedia/ChinaMedia.yaml
ruleset=Ⓜ️ 微软服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
ruleset=🍎 苹果服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
ruleset=📲 Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=🚀 国外流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🎯 国内流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 国内流量,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 国内流量,[]GEOIP,CN,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL

; ==================== 策略组定义 ====================
; 基础主代理组
custom_proxy_group=🚀 国外流量`select`[]♻️ 自动选择`[]🔯 故障转移`[]✈️ 手动选择
custom_proxy_group=✈️ 手动选择`select`.*

; 针对你节点的专属核心优化组（利用你的“AI”和“流媒体”标签）
custom_proxy_group=🧚 AI`select`AI`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=📹 YouTube`select`流媒体`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=🎥 Netflix`select`流媒体`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=🐹 DisneyPlus`select`流媒体`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=📺 巴哈姆特`select`(台|TW|Taiwan)`流媒体`[]✈️ 手动选择
custom_proxy_group=👨‍💻 GitHub`select`[]🚀 国外流量`[]🎯 国内流量`[]✈️ 手动选择

; 其他基础分流组
custom_proxy_group=🎯 国内流量`select`[]DIRECT`[]🚀 国外流量
custom_proxy_group=🌍 国外媒体`select`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=🌏 国内媒体`select`[]🎯 国内流量`[]✈️ 手动选择
custom_proxy_group=📲 Telegram`select`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 国内流量`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=🍎 苹果服务`select`[]🎯 国内流量`[]🚀 国外流量`[]✈️ 手动选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]🎯 国内流量
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 国外流量`[]🎯 国内流量`[]✈️ 手动选择

; 自动化测速组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
